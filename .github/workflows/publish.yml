name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Clean and build package (for CI)
        run: npm run rebuild

      - name: List dist contents after rebuild
        run: |
          echo "=== dist contents after rebuild ==="
          find dist -type f | sort

      - name: Show file list of the entire package
        run: |
          echo "=== All files in package (excluding node_modules) ==="
          find . -not -path "./node_modules/*" -not -path "./.git/*" -type f | sort

      - name: Create a tarball for inspection
        run: npm pack

      - name: List contents of the generated tarball
        run: |
          echo "=== Contents of tarball ==="
          tar -tzf kreqel-common-*.tgz | sort

      - name: Publish to npm
        run: npm run deploy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
